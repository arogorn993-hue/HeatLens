name: Build releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable exe
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Sign Windows executable (optional)
        if: env.WINDOWS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "heatlens.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          .\scripts\sign_windows.ps1 -PfxPath $pfxPath

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatLens-windows-x64
          path: dist/HeatLens.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tkinter
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Build portable binary
        run: bash scripts/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatLens-linux-x64
          path: |
            dist/HeatLens
            dist/HeatLens-linux-*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable app
        run: bash scripts/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatLens-macos-arm64
          path: |
            dist/HeatLens.app
            dist/HeatLens-macos-*.tar.gz

  publish-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/HeatLens-windows-x64/HeatLens.exe
            artifacts/HeatLens-linux-x64/HeatLens
            artifacts/HeatLens-linux-x64/HeatLens-linux-*.tar.gz
            artifacts/HeatLens-macos-arm64/HeatLens-macos-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-milestone-releases:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/tags/v0.1.6'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish v0.1.2
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.2
          name: HeatLens 0.1.2
          target_commitish: 30fbf12fe432628525371d07f69e25a27c66ad41
          body_path: .github/RELEASE_v0.1.2.md
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish v0.1.3
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.3
          name: HeatLens 0.1.3
          target_commitish: 906f533b134f9ea3c467824d4a43922be7e64a7f
          body_path: .github/RELEASE_v0.1.3.md
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
