name: Build releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable exe
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatLens-windows-x64
          path: dist/HeatLens.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tkinter
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Build portable binary
        run: bash scripts/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatLens-linux-x64
          path: |
            dist/HeatLens
            dist/HeatLens-linux-*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable app
        run: bash scripts/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeatLens-macos-arm64
          path: |
            dist/HeatLens.app
            dist/HeatLens-macos-*.tar.gz

  publish-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/HeatLens-windows-x64/HeatLens.exe
            artifacts/HeatLens-linux-x64/HeatLens
            artifacts/HeatLens-linux-x64/HeatLens-linux-*.tar.gz
            artifacts/HeatLens-macos-arm64/HeatLens-macos-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
