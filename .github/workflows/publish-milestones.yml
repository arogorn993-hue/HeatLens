name: Publish milestone releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-v0-1-2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish v0.1.2
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.2
          name: HeatLens 0.1.2
          target_commitish: 30fbf12fe432628525371d07f69e25a27c66ad41
          body_path: .github/RELEASE_v0.1.2.md
          make_latest: false

  publish-v0-1-3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish v0.1.3
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.3
          name: HeatLens 0.1.3
          target_commitish: 906f533b134f9ea3c467824d4a43922be7e64a7f
          body_path: .github/RELEASE_v0.1.3.md
          make_latest: false
